<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="10" y="10" width="800" height="500" rx="8" fill="#1a1b26" stroke="#3b3d52" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="10" y="10" width="800" height="32" rx="8" fill="#24263a"/>
  <rect x="10" y="30" width="800" height="12" fill="#24263a"/>
  <circle cx="32" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="26" r="6" fill="#febc2e"/>
  <circle cx="72" cy="26" r="6" fill="#28c840"/>
  <text x="410" y="30" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#787c99" text-anchor="middle">lumolog — testdata/sample_large.log</text>

  <!-- Sparkline bar -->
  <rect x="18" y="48" width="784" height="14" fill="#1e1f2e" rx="2"/>
  <g fill="#565f89" opacity="0.6">
    <rect x="20" y="56" width="8" height="4"/>
    <rect x="30" y="54" width="8" height="6"/>
    <rect x="40" y="52" width="8" height="8"/>
    <rect x="50" y="50" width="8" height="10"/>
    <rect x="60" y="54" width="8" height="6"/>
    <rect x="70" y="55" width="8" height="5"/>
    <rect x="80" y="48" width="8" height="12" fill="#7aa2f7"/>
    <rect x="90" y="49" width="8" height="11" fill="#7aa2f7"/>
    <rect x="100" y="52" width="8" height="8"/>
    <rect x="110" y="54" width="8" height="6"/>
    <rect x="120" y="56" width="8" height="4"/>
    <rect x="130" y="53" width="8" height="7"/>
    <rect x="140" y="51" width="8" height="9"/>
    <rect x="150" y="54" width="8" height="6"/>
    <rect x="160" y="48" width="8" height="12" fill="#f7768e"/>
    <rect x="170" y="50" width="8" height="10" fill="#f7768e"/>
    <rect x="180" y="53" width="8" height="7"/>
    <rect x="190" y="55" width="8" height="5"/>
    <rect x="200" y="54" width="8" height="6"/>
    <rect x="210" y="52" width="8" height="8"/>
  </g>

  <!-- Log lines area -->
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="11.5">
    <!-- Line numbers -->
    <text x="26" y="80" fill="#3b3d52">142</text>
    <text x="26" y="96" fill="#3b3d52">143</text>
    <text x="26" y="112" fill="#3b3d52">144</text>
    <text x="26" y="128" fill="#3b3d52">145</text>
    <text x="26" y="144" fill="#3b3d52">146</text>
    <text x="26" y="160" fill="#3b3d52">147</text>
    <text x="26" y="176" fill="#3b3d52">148</text>
    <text x="26" y="192" fill="#3b3d52">149</text>
    <text x="26" y="208" fill="#3b3d52">150</text>
    <text x="26" y="224" fill="#3b3d52">151</text>
    <text x="26" y="240" fill="#3b3d52">152</text>

    <!-- Log entries -->
    <text y="80" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:01</tspan>
      <tspan fill="#c0caf5"> Payment declined: card ending </tspan>
      <tspan fill="#bb9af7">4242</tspan>
      <tspan fill="#c0caf5"> for </tspan>
      <tspan fill="#7dcfff">user_12</tspan>
    </text>
    <text y="96" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:03</tspan>
      <tspan fill="#c0caf5"> Payment gateway timeout: Stripe API </tspan>
      <tspan fill="#bb9af7">10s</tspan>
    </text>
    <text y="112" x="60">
      <tspan fill="#e0af68" font-weight="bold">WRN</tspan>
      <tspan fill="#565f89"> 10:42:05</tspan>
      <tspan fill="#c0caf5"> Payment retry scheduled for txn_id=</tspan>
      <tspan fill="#7aa2f7">a3f2c1</tspan>
    </text>
    <text y="128" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:08</tspan>
      <tspan fill="#c0caf5"> Payment declined: insufficient_funds </tspan>
      <tspan fill="#7dcfff">user_31</tspan>
    </text>
    <text y="144" x="60">
      <tspan fill="#9ece6a" font-weight="bold">INF</tspan>
      <tspan fill="#565f89"> 10:42:10</tspan>
      <tspan fill="#c0caf5"> Payment processed: </tspan>
      <tspan fill="#7aa2f7">amount</tspan>
      <tspan fill="#565f89">=</tspan>
      <tspan fill="#ff9e64">$45.20</tspan>
      <tspan fill="#c0caf5"> </tspan>
      <tspan fill="#7dcfff">user_5</tspan>
    </text>
    <text y="160" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:12</tspan>
      <tspan fill="#c0caf5"> Stripe webhook signature verification failed</tspan>
    </text>
    <text y="176" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:15</tspan>
      <tspan fill="#c0caf5"> Payment declined: card ending </tspan>
      <tspan fill="#bb9af7">1881</tspan>
      <tspan fill="#c0caf5"> for </tspan>
      <tspan fill="#7dcfff">user_7</tspan>
    </text>
    <text y="192" x="60">
      <tspan fill="#e0af68" font-weight="bold">WRN</tspan>
      <tspan fill="#565f89"> 10:42:18</tspan>
      <tspan fill="#c0caf5"> Payment retry scheduled for txn_id=</tspan>
      <tspan fill="#7aa2f7">d8e4b2</tspan>
    </text>
    <text y="208" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:20</tspan>
      <tspan fill="#c0caf5"> Payment gateway timeout: Stripe API </tspan>
      <tspan fill="#bb9af7">10s</tspan>
    </text>
    <text y="224" x="60">
      <tspan fill="#9ece6a" font-weight="bold">INF</tspan>
      <tspan fill="#565f89"> 10:42:22</tspan>
      <tspan fill="#c0caf5"> Payment processed: </tspan>
      <tspan fill="#7aa2f7">amount</tspan>
      <tspan fill="#565f89">=</tspan>
      <tspan fill="#ff9e64">$120.00</tspan>
      <tspan fill="#c0caf5"> </tspan>
      <tspan fill="#7dcfff">user_19</tspan>
    </text>
    <text y="240" x="60">
      <tspan fill="#f7768e" font-weight="bold">ERR</tspan>
      <tspan fill="#565f89"> 10:42:25</tspan>
      <tspan fill="#c0caf5"> Payment declined: insufficient_funds </tspan>
      <tspan fill="#7dcfff">user_44</tspan>
    </text>
  </g>

  <!-- Analysis overlay -->
  <rect x="80" y="120" width="660" height="310" rx="6" fill="#1a1b26" stroke="#7aa2f7" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Overlay title bar -->
  <rect x="80" y="120" width="660" height="28" rx="6" fill="#24263a"/>
  <rect x="80" y="140" width="660" height="8" fill="#24263a"/>
  <text x="410" y="139" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#7aa2f7" text-anchor="middle" font-weight="bold">AI Analysis (Esc to close)</text>

  <!-- Analysis content -->
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="11.5" fill="#c0caf5">
    <text x="100" y="170" fill="#7aa2f7" font-weight="bold">Payment System Issues Detected:</text>

    <text x="100" y="195" fill="#f7768e">1. High Decline Rate (60%+)</text>
    <text x="100" y="212" fill="#a9b1d6">   Most declines cite "insufficient_funds" across multiple</text>
    <text x="100" y="229" fill="#a9b1d6">   users (user_12, user_31, user_44) — not a single-card issue.</text>

    <text x="100" y="254" fill="#e0af68">2. Stripe Gateway Timeouts</text>
    <text x="100" y="271" fill="#a9b1d6">   Recurring 10s timeouts to Stripe API at 10:42:03 and</text>
    <text x="100" y="288" fill="#a9b1d6">   10:42:20 suggest upstream connectivity or rate limiting.</text>

    <text x="100" y="313" fill="#e0af68">3. Webhook Verification Failure</text>
    <text x="100" y="330" fill="#a9b1d6">   Stripe webhook signature check failed at 10:42:12 —</text>
    <text x="100" y="347" fill="#a9b1d6">   possible signing secret mismatch or replay attack.</text>

    <text x="100" y="372" fill="#9ece6a">Recommendation:</text>
    <text x="100" y="389" fill="#a9b1d6">   Check Stripe dashboard for service incidents. The timeout</text>
    <text x="100" y="406" fill="#a9b1d6">   pattern + webhook failure suggests an upstream issue.</text>
  </g>

  <!-- Stats bar -->
  <rect x="18" y="436" width="784" height="16" fill="#1e1f2e" rx="2"/>
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="10">
    <text x="24" y="448" fill="#f7768e" font-weight="bold">ERR:487</text>
    <text x="84" y="448" fill="#e0af68" font-weight="bold">WRN:201</text>
    <text x="148" y="448" fill="#9ece6a" font-weight="bold">INF:349</text>
  </g>

  <!-- Status bar -->
  <rect x="18" y="456" width="784" height="18" fill="#c0caf5" rx="2"/>
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="10.5">
    <text x="24" y="469" fill="#1a1b26"> sample_large.log</text>
    <text x="160" y="469" fill="#1a1b26">| JSON</text>
    <text x="210" y="469" fill="#1a1b26">| 1037 lines</text>
    <text x="310" y="469" fill="#1a1b26">| Filter: "payment" (1037 matches)</text>
    <text x="590" y="469" fill="#bb9af7" font-weight="bold">| AI</text>
    <text x="622" y="469" fill="#1a1b26">| 4%</text>
  </g>

  <!-- Annotation arrows and labels -->
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="10" fill="#565f89">
    <text x="612" y="488" fill="#bb9af7">^</text>
    <text x="595" y="502" fill="#565f89" font-size="9">AI connected</text>
  </g>
</svg>
